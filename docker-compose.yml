services:
  mysql:
    image: mysql:8.4
    container_name: daelim-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: strong1234
      MYSQL_DATABASE: daelim
      MYSQL_USER: daelim
      MYSQL_PASSWORD: 1234
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data: